    <div class="container max-w-" 768px="">
      <div class="flex min-h-dvh flex-col gap-4 bg-green-50 p-4">
        <div class="flex w-full flex-col">
          <!-- avatar + Name -->
          <div class="mb-4 flex">
            <a
              href=""
              class="flex items-center gap-2 hover:opacity-80 transition-all focus:outline-none focus:ring-2 focus:ring-green-400"
            >
              <img
                src="https://api.dicebear.com/7.x/lorelei/svg?seed=JohnDoe/300"

              />

            </a>

          <!-- card balance + Action -->

            <div
              class="flex flex-col h-[165px] bg-gradient-to-b from-brands-light-green to-emerald-400 justify-between rounded-2xl p-5 text-white"
            >
              <h1 class="font-brand text-2xl font-bold">Kusaku</h1>
              <h2 class="flex items-center gap-2 text-2xl font-medium">
                <span>Rp. 52.000.000,00</span>
                <button
                  type="button"

                ></button>
              </h2>
            </div>
            <!-- card balance -->

            <!-- card action -->
            <div class="flex gap-3 mt-2 jsuticen">
              <button
                type="button"
                class="inline-flex w-full items-center justify-center bg-transparent p-2 rounded-2xl text-brands-light-green hover:bg-brands-light-green hover:text-white focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-xs gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:border-gray-300 disabled:border-tran border-2 border-brands-light-green"
              >
                <span
                  class="i-material-symbols-download-rounded text-icon-md"
                ></span>
                <span>Top Up</span>
              </button>

              <button
                type="button"
                class="inline-flex w-full items-center justify-center bg-brands-light-green p-2 rounded-2xl text-white hover:bg-brands-dark-green focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-xs gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400"
              >
                <span class="i-material-symbols-upload text-icon-md"></span>
                <span>Transfer</span>
              </button>
            </div>
            <!-- card action -->
          </div>
          <!-- card balance + Action -->
