<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../assets/css/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Red+Rose:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="shortcut icon"
      href="../assets/images/favicon.ico"
      type="image/x-icon"
    />
    <title>Register</title>
  </head>
  <body>
    <div class="container max-w-[768px]">
      <div
        class="flex h-dvh flex-col items-center justify-center bg-green-50 p-4"
      >
        <div class="flex w-full flex-col">
          <!-- Illustration -->
          <img
            src="../assets/images/email-sent.svg"
            alt="Illustration"
            class="h-[168px] w-[168px] mx-auto"
          />
          <!-- end illustration -->

          <!-- title + description -->
          <div class="mb-5 mt-8 flex flex-col">
            <h1 class="text-center text-lg font-semibold text-gray-900">
              Konfirmasi Email
            </h1>
            <p class="text-center text-xs font-medium text-gray-400">
              Silahkan cek inbox email Anda dan klik link yang kami kirim untuk konfirmasi email Anda. Jika belum muncul tunggu beberapa menit atau klik tombol ini
            </p>
          </div>
          <!-- end title description -->

          

            <!-- button action -->
            <button type="button" class="inline-flex items-center justify-center bg-transparent p-2.5 rounded-2xl text-brands-light-green hover:bg-brands-light-green hover:text-white focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-sm gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:border-gray-300 disabled:border-tran border-2 border-brands-light-green">
                <span class="i-material-symbols-send text-lg"></span>
                <span>KIRIM ULANG</span>
              </button>
            <!-- button action -->

            

            <!-- help text -->
            <p class="mt-3 text-center text-xs text-neutral-400">
              <a
                href=""
                class="text-xs font-semibold text-brands-light-green hover:text-brands-light-green/70 focus:outline-none focus:ring-2 focus:ring-green-400"
                >Keluar</a
              >
            </p>
            <!-- help text -->
          </form>
          <!-- end form -->
        </div>
      </div>
    </div>
  </body>
</html>
