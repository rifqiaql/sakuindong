<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../assets/css/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Red+Rose:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../assets/images/favicon.ico"
      type="image/x-icon"
    />
    <title>Transaction Settled</title>
  </head>
  <body>
    <div class="container max-w-[768px]">
      <!-- app bar -->
      <div
        class="flex items-center gap-5 bg-white p-4 text-gray-900 fixed top-0 left-0 w-full z-10"
      >
        <a
          href="#"
          class="hover:text-gray-400 focus:outline-none focus:ring-2 focus:ring-green-400"
          onclick="history.back()"
        >
          <span
            class="block i-material-symbols-arrow-left-alt-rounded text-2xl"
          ></span>
        </a>
        <p class="text-lg font-semibold">Status Transaksi</p>
      </div>
      <!-- app bar -->

      <div class="flex min-h-dvh flex-col gap-4 bg-green-50 pb-[80px]">
        <div class="relative h-[260px] bg-brands-light-green"></div>
        <div class="absolute mt-[92px] w-full flex flex-col gap-10 p-4">
          <!-- title -->
          <div class="flex flex-col">
            <h1 class="text-center text-lg font-semibold text-white">
              Transaksi Berhasil Diproses
            </h1>
          </div>
          <!-- title -->

          <!-- card transaction info -->
          <div class="flex flex-col gap-4 rounded-2xl bg-white p-4 shadow-md">
            <p class="text-right text-xs text-gray-900">
              ID Transaksi #KS08387847
            </p>
            <p class="text-center text-2xl font-bold text-gray-900">
              - Rp. 300.000
            </p>
            <div class="flex flex-col gap-2">
              <div class="flex justify-between">
                <p class="text-xs text-gray-500">Kategori</p>
                <p class="text-xs font-semibold text-gray-900">Uang Keluar</p>
              </div>
            </div>
            <div class="flex flex-col gap-2">
              <div class="flex justify-between">
                <p class="text-xs text-gray-500">Penerima</p>
                <p class="text-xs font-semibold text-gray-900">Sphi Yhon</p>
              </div>
            </div>
            <div class="flex flex-col gap-2">
              <div class="flex justify-between">
                <p class="text-xs text-gray-500">Bank Penerima</p>
                <p class="text-xs font-semibold text-gray-900">Mandiri</p>
              </div>
            </div>
            <div class="flex flex-col gap-2">
              <div class="flex justify-between">
                <p class="text-xs text-gray-500">Nomor Rekening</p>
                <p class="text-xs font-semibold text-gray-900">1234567890</p>
              </div>
            </div>
            <div class="flex flex-col gap-2">
              <div class="flex justify-between">
                <p class="text-xs text-gray-500">Waktu Transaksi</p>
                <p class="text-xs font-semibold text-gray-900">
                  Mon Jul 13 2026 13:43:50
                </p>
              </div>
            </div>
          </div>
          <!-- card transaction info -->

          <!-- button -->
          <button
            type="button"
            class="inline-flex items-center justify-center bg-transparent p-2.5 rounded-2xl text-brands-light-green hover:bg-brands-light-green hover:text-white focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-sm gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:border-gray-300 disabled:border-tran border-2 border-brands-light-green"
          >
            <span
              class="i-material-symbols-receipt-rounded text-icon-md"
            ></span>
            <span>Lihat Transaksi Lainnya</span>
          </button>
          <!-- button -->
        </div>
      </div>

      <!-- navbar -->
      <div
        class="flex justify-evenly bg-white z-10 left-0 fixed bottom-0 w-full"
      >
        <a
          href="#"
          class="w-full group flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-green-400 p-3 text-gray-900 hover:bg-gray-50"
        >
          <span
            class="i-material-symbols-home-outline-rounded text-xl inline group-hover:hidden"
          ></span>

          <span
            class="i-material-symbols-home-rounded text-xl hidden group-hover:inline"
          ></span>

          <span class="text-xs font-semibold">Home</span>
        </a>
        <a
          href="#"
          class="w-full group flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-green-400 p-3 text-gray-900 hover:bg-gray-50"
        >
          <span
            class="i-material-symbols-receipt-outline-rounded text-xl inline group-hover:hidden"
          ></span>

          <span
            class="i-material-symbols-receipt-rounded text-xl hidden group-hover:inline"
          ></span>

          <span class="text-xs font-semibold">History</span>
        </a>
        <a
          href="#"
          class="w-full group flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-green-400 p-3 text-gray-900 hover:bg-gray-50"
        >
          <span
            class="i-material-symbols-person-outline text-xl inline group-hover:hidden"
          ></span>

          <span
            class="i-material-symbols-person text-xl hidden group-hover:inline"
          ></span>

          <span class="text-xs font-semibold">Account</span>
        </a>
      </div>
      <!-- navbar -->
    </div>
  </body>
</html>
