<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Red+Rose:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Index Components</title>
  </head>
  <body>
    <div class="container max-w-[768px]">
      <div class="h-min-screen bg-blue-50 px-4 pb-12">
        <!-- App bar -->
        <div class="flex items-center gap-5 bg-white p-4 text-gray-900">
          <a
            href="#"
            class="hover:text-gray-400 focus:outline-none focus:ring-2 focus:ring-green-400"
            onclick="history.back()"
          >
            <span
              class="block i-material-symbols-arrow-left-alt-rounded text-2xl"
            ></span>
          </a>
          <p class="text-lg font-semibold">Untitled</p>
        </div>
        <!-- end app bar -->

        <div class="h-8"></div>
          <!-- navbar -->
          <div class="flex justify-evenly bg-white">

            <a href="#" class="w-full group flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-green-400 p-3 text-gray-900 hover:bg-gray-50">
  
              <span class="i-material-symbols-home-outline-rounded text-xl inline group-hover:hidden"></span>
  
              <span class="i-material-symbols-home-rounded text-xl hidden group-hover:inline"></span>
  
              <span class="text-xs font-semibold">Home</span>
            </a>
            <a href="#" class="w-full group flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-green-400 p-3 text-gray-900 hover:bg-gray-50">
  
              <span class="i-material-symbols-receipt-outline-rounded text-xl inline group-hover:hidden"></span>
  
              <span class="i-material-symbols-receipt-rounded text-xl hidden group-hover:inline"></span>
  
              <span class="text-xs font-semibold">History</span>
            </a>
            <a href="#" class="w-full group flex flex-col items-center focus:outline-none focus:ring-2 focus:ring-green-400 p-3 text-gray-900 hover:bg-gray-50">
  
              <span class="i-material-symbols-person-outline text-xl inline group-hover:hidden"></span>
  
              <span class="i-material-symbols-person text-xl hidden group-hover:inline"></span>
  
              <span class="text-xs font-semibold">Account</span>
            </a>
          </div>
            <!-- end navbar -->

            <div class="h-8"></div>
            <div>

              <h1 class="text-2xl text-center text-gray-900">Button Primary</h1>
              <!-- button primary Large -->
              <button type="button" class="inline-flex items-center bg-brands-light-green p-2.5 rounded-2xl text-white hover:bg-brands-dark-green focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-sm gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400" >
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
                <span>My Button</span>
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
              </button>
              <!-- end button primary Large -->
              
              <!-- button primary Small -->
              <button type="button" class="inline-flex items-center bg-brands-light-green p-2 rounded-2xl text-white hover:bg-brands-dark-green focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-xs gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400" >
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
                <span>My Button</span>
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
              </button>
              <!-- end button primary Small -->
            </div>

            

            <div class="h-8"></div>
            <div>

              <h1 class="text-2xl text-center text-gray-900">Button Outline</h1>
              <!-- button outline Large -->
              <button type="button" class="inline-flex items-center bg-transparent p-2.5 rounded-2xl text-brands-light-green hover:bg-brands-light-green hover:text-white focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-sm gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:border-gray-300 disabled:border-tran border-2 border-brands-light-green" >
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
                <span>My Button</span>
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
              </button>
              <!-- end button outline Large -->
              
              <!-- button outline Small -->
              <button type="button" class="inline-flex items-center bg-transparent p-2 rounded-2xl text-brands-light-green hover:bg-brands-light-green hover:text-white focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-xs gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-400 disabled:border-gray-300 disabled:border-tran border-2 border-brands-light-green" >
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
                <span>My Button</span>
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
              </button>
              <!-- end button outline Small -->
            </div>

            
            <div class="h-8"></div>
            <div>

              <h1 class="text-2xl text-center text-gray-900">Button Secondary</h1>
              <!-- button secondary Large -->
              <button type="button" class="inline-flex items-center bg-white p-2.5 rounded-2xl text-brands-light-green hover:bg-emerald-100 focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-sm gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-200 disabled:border-gray-300 disabled:border-tran border-brands-light-green " >
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
                <span>My Button</span>
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
              </button>
              <!-- end button secondary Large -->
              
              <!-- button secondary Small -->
              <button type="button" class="inline-flex items-center bg-white p-2.5 rounded-2xl text-brands-light-green hover:bg-emerald-100 focus:outline-none transition-all focus:ring-2 focus:ring-green-400 uppercase font-semibold text-xs gap-2 disabled:cursor-not-allowed disabled:bg-gray-200 disabled:text-gray-200 disabled:border-gray-300 disabled:border-tran border-brands-light-green "  >
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
                <span>My Button</span>
                <span class="i-material-symbols-download-rounded text-icon-md"></span>
              </button>
              <!-- end button secondary Small -->
            </div>

            <div class="h-8"></div>
            <!-- input -->
            <h1 class="text-center text-2xl text-gray-900">Input Text</h1>
            <div class="">
              <label for="my-input-text" class="block ps-4 text-sm font-md uppercase text-gray-900 empty:hidden">Input Label</label>
              <div class="relative">
                <input id="my-input-text" type="email" class="w-full bg-white rounded-2xl border-gray-400 p-3 pe-12 ps-12 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-green-400 invalid:bg-red-200 invalid:text-red-900 invalid:caret-red-900 focus:invalid:ring-red-900 peer disabled:border-gray-300 disabled:bg-gray-100" placeholder="Input Placeholder " />
                <div class="absolute start-0 inset-y-0 text-md flex items-center ps-4 text-gray-400 peer-invalid:text-red-400 peer-invalid:peer-focus:text-red-900">
                  <span class="i-material-symbols-search-rounded"></span>
                </div>
                <div class="absolute inset-y-0 end-0 flex items-center pe-4 text-gray-400 peer-invalid:text-red-400 peer-invalid:peer-focus:text-red-900">
                  <span class="i-material-symbols-search-rounded"></span>
                </div>
              </div>
              <p class="ps-4 text-xs text-gray-900">This is for hint!</p>
            </div>
            <!-- end input -->

          </div>
      </div>
    </div>
  </body>
</html>
